name: Create Post

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Paper URL (arXiv or other)'
        required: true
      display_tags:
        description: 'Display tags (comma-separated)'
        required: false
        default: ''
      terrys_memo:
        description: "Terry's memo"
        required: false
        default: ''
      status:
        description: 'Post status (draft/published)'
        required: false
        default: 'draft'
      featured:
        description: 'Featured post (true/false)'
        required: false
        default: 'false'

jobs:
  create-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Terry Homepage Bot"
          git config user.email "bot@terryum-ai.noreply"

      - name: Build prompt
        id: prompt
        run: |
          PROMPT="${{ inputs.url }}"
          if [ -n "${{ inputs.display_tags }}" ]; then
            PROMPT="$PROMPT --tags=${{ inputs.display_tags }}"
          fi
          if [ -n "${{ inputs.terrys_memo }}" ]; then
            PROMPT="$PROMPT --memo=${{ inputs.terrys_memo }}"
          fi
          if [ "${{ inputs.status }}" = "draft" ]; then
            PROMPT="$PROMPT --draft"
          fi
          if [ "${{ inputs.featured }}" = "true" ]; then
            PROMPT="$PROMPT --featured"
          fi
          echo "prompt=$PROMPT" >> $GITHUB_OUTPUT

      - name: Create post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions -p "/post ${{ steps.prompt.outputs.prompt }}"
