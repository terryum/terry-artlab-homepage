name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

# Queue deploys on the same branch so they run in order (no cancellation).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build + deploy to Cloudflare Workers
        env:
          # Cloudflare auth — used by wrangler for `deploy` and R2 `put`.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

          # Public site URL — baked into the Next client bundle at build time.
          NEXT_PUBLIC_SITE_URL: https://www.terryum.ai
          NEXT_PUBLIC_SITE_NAME: Terry Um

          # Supabase — client uses anon key; server uses service role (runtime).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

          # Public asset / newsletter URLs — client bundle.
          NEXT_PUBLIC_R2_URL: ${{ secrets.NEXT_PUBLIC_R2_URL }}
          NEXT_PUBLIC_SUBSTACK_EN_URL: ${{ secrets.NEXT_PUBLIC_SUBSTACK_EN_URL }}
          NEXT_PUBLIC_SUBSTACK_KO_URL: ${{ secrets.NEXT_PUBLIC_SUBSTACK_KO_URL }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run deploy:cf
